version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: sppd_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel
      MYSQL_USER: development_sppd
      MYSQL_PASSWORD: "@supersecret"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sppd_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

  redis:
    image: redis:7
    container_name: sppd_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data: